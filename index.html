<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="AK Pack Fitness — Attendance Terminal"/>
  <title>AK Pack Fitness — Attendance Terminal</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header class="site-header">
    <div class="header-logo"><span>AK</span> PACK FITNESS</div>
    <div class="header-subtitle">Attendance Terminal</div>
    <nav class="header-nav">
      <a href="index.html" class="active">CHECK IN</a>
      <a href="admin.html">ADMIN MONITOR</a>
      <a href="history.html">HISTORY</a>
    </nav>
  </header>

  <!-- ─── MAIN ─── -->
  <main class="page-content">
    <div class="container">

      <!-- CHECK-IN CARD -->
      <div class="card" style="max-width:560px;margin:0 auto">
        <div class="section-title text-center">CHECK IN</div>
        <div class="section-divider" style="margin:6px auto 24px"></div>

        <div class="form-group">
          <label class="form-label" for="memberIdInput">Enter Member ID</label>
          <input
            class="form-input"
            id="memberIdInput"
            type="text"
            placeholder="E.G. AK-001"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="characters"
            spellcheck="false"
          />
        </div>

        <button class="btn btn-primary btn-block btn-large" id="checkInBtn">
          CHECK IN
        </button>

        <button class="btn btn-secondary btn-block mt-8" id="resetBtn" style="padding:12px;font-size:0.9rem;letter-spacing:3px">
          CLEAR / RESET
        </button>
      </div>

      <!-- LOADING SPINNER -->
      <div id="loadingSpinner" class="hidden text-center mt-24">
        <div class="spinner"></div>
        <p style="font-family:var(--font-heading);letter-spacing:4px;font-size:0.85rem;color:var(--white-dim);margin-top:8px">SEARCHING PACK...</p>
      </div>

      <!-- TERMINAL MESSAGE (errors/warnings before result) -->
      <div id="terminalMessage" class="hidden" style="max-width:560px;margin:16px auto 0"></div>

      <!-- MEMBER RESULT CARD -->
      <div id="memberResult" class="hidden mt-24" style="max-width:680px;margin-left:auto;margin-right:auto"></div>

    </div>
  </main>

  <!-- ─── FOOTER ─── -->
  <footer class="site-footer">
    <p>AK PACK FITNESS &copy; <span id="fyear"></span> — <span>ATTENDANCE SYSTEM</span></p>
    <p style="margin-top:8px">
      <button onclick="showConfigOverlay()" style="background:none;border:none;color:rgba(255,255,255,0.2);font-family:var(--font-heading);font-size:0.7rem;letter-spacing:3px;cursor:pointer;text-transform:uppercase" id="settingsBtn">
        ⚙ SETTINGS
      </button>
    </p>
  </footer>

  <script src="script.js"></script>
  <script>
    document.getElementById('fyear').textContent = new Date().getFullYear();
    // Check config on load — show setup if missing
    document.addEventListener('DOMContentLoaded', () => {
      requireConfig();
    });
  </script>
</body>
</html>
