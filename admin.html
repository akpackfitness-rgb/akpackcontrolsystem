<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="AK Pack Fitness — Admin Monitor"/>
  <title>AK Pack Fitness — Admin Monitor</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header class="site-header">
    <div class="header-logo"><span>AK</span> PACK FITNESS</div>
    <div class="header-subtitle">Attendance Monitor</div>
    <nav class="header-nav">
      <a href="index.html">CHECK IN</a>
      <a href="admin.html" class="active">ADMIN MONITOR</a>
      <a href="history.html">HISTORY</a>
    </nav>
  </header>

  <!-- ─── MAIN ─── -->
  <main class="page-content">
    <div class="container-wide">

      <!-- TOP STATS ROW -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:32px">

        <!-- PACK COUNTER -->
        <div class="stat-counter" style="grid-column:span 1">
          <div class="stat-counter-label">Pack Inside Now</div>
          <div class="stat-counter-number" id="packCounter">—</div>
          <div class="stat-counter-sub">Check-ins Today</div>
        </div>

        <!-- LIVE STATUS -->
        <div class="card" style="display:flex;flex-direction:column;justify-content:center;gap:12px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span class="live-dot">LIVE</span>
            <button class="btn btn-secondary" style="padding:8px 16px;font-size:0.78rem;letter-spacing:2px" onclick="loadAdminDashboard()">↻ REFRESH</button>
          </div>
          <div>
            <div style="font-family:var(--font-heading);font-size:0.72rem;letter-spacing:3px;color:rgba(255,255,255,0.35);text-transform:uppercase">Auto-refresh every 8s</div>
            <div style="font-family:var(--font-heading);font-size:0.82rem;letter-spacing:2px;color:var(--white-dim);margin-top:4px">
              Last updated: <span id="lastRefresh" style="color:var(--white)">—</span>
            </div>
          </div>
        </div>

        <!-- QUICK LINKS -->
        <div class="card" style="display:flex;flex-direction:column;justify-content:center;gap:10px">
          <div class="section-title" style="font-size:1.2rem">QUICK LINKS</div>
          <a href="history.html" class="btn btn-secondary" style="text-align:center;text-decoration:none;padding:10px 16px;font-size:0.82rem;letter-spacing:2px">📋 FULL HISTORY</a>
          <a href="index.html" class="btn btn-secondary" style="text-align:center;text-decoration:none;padding:10px 16px;font-size:0.82rem;letter-spacing:2px">🏋️ CHECK-IN TERMINAL</a>
        </div>

      </div>

      <!-- TODAY'S ATTENDANCE TABLE -->
      <div class="card">
        <div class="flex-between mb-16">
          <div>
            <div class="section-title" style="font-size:1.5rem">TODAY'S ATTENDANCE</div>
            <div class="section-divider"></div>
          </div>
          <span class="live-dot" style="align-self:flex-start">AUTO-REFRESHING</span>
        </div>

        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Member ID</th>
                <th>Name</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="attendanceTbody">
              <tr>
                <td colspan="5" style="text-align:center;padding:40px">
                  <div class="spinner"></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <!-- ─── FOOTER ─── -->
  <footer class="site-footer">
    <p>AK PACK FITNESS &copy; <span id="fyear"></span> — <span>ADMIN MONITOR</span></p>
    <p style="margin-top:8px">
      <button onclick="showConfigOverlay()" style="background:none;border:none;color:rgba(255,255,255,0.2);font-family:var(--font-heading);font-size:0.7rem;letter-spacing:3px;cursor:pointer;text-transform:uppercase">
        ⚙ SETTINGS
      </button>
    </p>
  </footer>

  <script src="script.js"></script>
  <script>
    document.getElementById('fyear').textContent = new Date().getFullYear();
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireConfig()) return;
      startAdminAutoRefresh(8);
    });
  </script>
</body>
</html>
