<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AK Pack Fitness</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar);
  background:rgba(10,22,40,.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 16px var(--accent-glow)}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.08em}
.logo-sub{font-size:9px;color:var(--text2);letter-spacing:.14em;text-transform:uppercase;margin-top:-2px}
.topbar-right{display:flex;align-items:center;gap:12px}
.clock-wrap{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600;color:var(--text2);letter-spacing:.04em}
.admin-link{background:var(--card);border:1px solid var(--border2);color:var(--text2);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.admin-link:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}

/* ── MAIN GRID ── */
.main{
  position:fixed;
  top:var(--topbar);left:0;right:0;bottom:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 52px;
  gap:12px;padding:12px;
  z-index:1;
}

/* ── LEFT COL ── */
.left-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ENTRY / EXIT */
.action-btn{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;cursor:pointer;text-decoration:none;color:var(--text);
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;min-height:0;
}
.action-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:inherit}
.action-btn.entry::before{background:radial-gradient(circle at 50% 60%,rgba(0,200,150,.18) 0%,transparent 70%)}
.action-btn.exit::before{background:radial-gradient(circle at 50% 60%,rgba(224,85,85,.15) 0%,transparent 70%)}
.action-btn:hover::before{opacity:1}
.action-btn.entry:hover{border-color:var(--accent);box-shadow:0 0 28px rgba(0,200,150,.2);transform:translateY(-2px)}
.action-btn.exit:hover{border-color:var(--red);box-shadow:0 0 28px rgba(224,85,85,.2);transform:translateY(-2px)}
.action-btn:active{transform:scale(.97)}
.action-icon{font-size:36px;line-height:1}
.action-label{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.1em}
.action-btn.entry .action-label{color:var(--accent)}
.action-btn.exit .action-label{color:var(--red)}
.action-sub{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.action-btn.entry{animation:breatheTeal 3s ease-in-out infinite}
.action-btn.exit{animation:breatheRed 3s ease-in-out infinite;animation-delay:1.5s}
@keyframes breatheTeal{0%,100%{box-shadow:0 0 0 0 rgba(0,200,150,0)}50%{box-shadow:0 0 18px 2px rgba(0,200,150,.1)}}
@keyframes breatheRed{0%,100%{box-shadow:0 0 0 0 rgba(224,85,85,0)}50%{box-shadow:0 0 18px 2px rgba(224,85,85,.1)}}

/* ── RIGHT COL ── */
.right-col{display:grid;grid-template-rows:1fr auto;gap:12px}

/* GRAPH */
.graph-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;min-height:0}
.graph-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-shrink:0}
.day-pills{display:flex;gap:3px}
.day-pill{padding:3px 7px;border-radius:20px;font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.06em;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:transparent;transition:all .2s}
.day-pill.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.bar-chart{display:flex;align-items:flex-end;gap:4px;flex:1;min-height:0;padding-top:6px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.bar{width:100%;border-radius:3px 3px 0 0;background:rgba(124,111,205,.25);transition:height .6s cubic-bezier(.34,1.56,.64,1),background .2s;cursor:pointer;min-height:3px}
.bar.peak{background:var(--purple);box-shadow:0 0 10px rgba(124,111,205,.5)}
.bar:hover{background:var(--accent)}
.bar-label{font-size:8px;color:var(--text3);font-family:'Barlow Condensed',sans-serif;white-space:nowrap}

/* MINI STATS ROW */
.mini-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mini-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 8px;text-align:center}
.mini-val{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;margin-bottom:2px}
.mini-label{font-size:8px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.stat-inside .mini-val{color:var(--blue)}
.stat-checkin .mini-val{color:var(--accent)}
.stat-exits .mini-val{color:var(--text2)}

/* PACK FEED */
.pack-feed{
  grid-column:1/-1;
  background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius);
  padding:0 18px;display:flex;align-items:center;gap:14px;overflow:hidden;
}
.feed-wolf{font-size:20px;flex-shrink:0;filter:drop-shadow(0 0 8px var(--accent))}
.feed-text{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:500;color:var(--text2);letter-spacing:.03em;flex:1;transition:opacity .5s,transform .4s}
.feed-text.out{opacity:0;transform:translateY(-8px)}
.feed-dots{display:flex;gap:4px;flex-shrink:0}
.fdot{width:5px;height:5px;border-radius:50%;background:var(--border2);transition:background .3s}
.fdot.on{background:var(--accent)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .main{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 44px;gap:10px;padding:10px}
  .left-col{grid-column:1/2;grid-row:1/2}
  .right-col{grid-column:2/3;grid-row:1/3}
  .pack-feed{grid-row:3}
}
@media(max-width:600px){
  .main{position:relative;top:var(--topbar);bottom:auto;height:auto;display:flex;flex-direction:column;gap:10px;padding:10px;overflow-y:auto}
  .left-col{grid-template-columns:1fr 1fr;min-height:160px}
  .action-icon{font-size:28px}
  .action-label{font-size:20px}
  .logo-sub{display:none}
  .bar-chart{height:60px}
}
/* LANDSCAPE MOBILE/TABLET */
@media(max-height:520px){
  :root{--topbar:48px}
  .main{gap:8px;padding:8px}
  .action-icon{font-size:24px}
  .action-label{font-size:20px}
  .action-sub{display:none}
  .mini-val{font-size:20px}
  .bar-chart{min-height:40px}
  .pack-feed{padding:0 12px}
  .feed-text{font-size:12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" id="logoEl">
    <div class="logo-icon">🐺</div>
    <div>
      <div class="logo-text">AK Pack Fitness</div>
      <div class="logo-sub">Check-In Terminal</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="clock-wrap"><span class="live-dot"></span><span id="clock">--:-- --</span></div>
    <a class="admin-link" href="admin.html">⚙ Admin</a>
  </div>
</div>

<div class="main">

  <!-- LEFT: ENTRY + EXIT -->
  <div class="left-col">
    <a class="action-btn entry" href="numpad.html?mode=entry">
      <div class="action-icon">✅</div>
      <div class="action-label">Entry</div>
      <div class="action-sub">Tap to check in</div>
    </a>
    <a class="action-btn exit" href="numpad.html?mode=exit">
      <div class="action-icon">🚪</div>
      <div class="action-label">Exit</div>
      <div class="action-sub">Tap to check out</div>
    </a>
  </div>

  <!-- RIGHT: GRAPH + MINI STATS -->
  <div class="right-col">
    <div class="graph-card">
      <div class="graph-header">
        <div class="card-title">📊 Peak Hours</div>
        <div class="day-pills">
          <button class="day-pill active" onclick="setDay(this,'Mon')">Mon</button>
          <button class="day-pill" onclick="setDay(this,'Tue')">Tue</button>
          <button class="day-pill" onclick="setDay(this,'Wed')">Wed</button>
          <button class="day-pill" onclick="setDay(this,'Thu')">Thu</button>
          <button class="day-pill" onclick="setDay(this,'Fri')">Fri</button>
          <button class="day-pill" onclick="setDay(this,'Sat')">Sat</button>
        </div>
      </div>
      <div class="bar-chart" id="barChart"></div>
    </div>

    <div class="mini-stats">
      <div class="mini-stat stat-inside"><div class="mini-val" id="insideCount">0</div><div class="mini-label">Inside Now</div></div>
      <div class="mini-stat stat-checkin"><div class="mini-val" id="checkinCount">0</div><div class="mini-label">Check-ins</div></div>
      <div class="mini-stat stat-exits"><div class="mini-val" id="exitCount">0</div><div class="mini-label">Exits</div></div>
    </div>
  </div>

  <!-- PACK FEED -->
  <div class="pack-feed">
    <div class="feed-wolf">🐺</div>
    <div class="feed-text" id="feedText">Loading pack message...</div>
    <div class="feed-dots" id="feedDots"></div>
  </div>

</div>

<div class="toast-container" id="tc"></div>

<script>
const SHEET_ID = localStorage.getItem('ak_sheet_id')||'1Vo8k_hEm6OrJt-Bqf1T8vxcMH4_U9DoXkxsJPt9lKsw';

/* CLOCK */
function tick(){
  const n=new Date();let h=n.getHours();const m=String(n.getMinutes()).padStart(2,'0');
  const ap=h>=12?'PM':'AM';h=h%12||12;
  document.getElementById('clock').textContent=`${h}:${m} ${ap}`;
}
tick();setInterval(tick,1000);

/* BAR CHART */
const HD={Mon:[2,5,8,12,9,7,6,8,10,14,18,22,19,15,12,8],Tue:[1,4,7,10,8,6,5,7,9,13,17,20,18,14,11,7],Wed:[3,6,9,13,10,8,7,9,11,15,19,23,20,16,13,9],Thu:[2,5,8,11,9,7,6,8,10,14,18,21,19,15,12,8],Fri:[4,7,10,14,11,9,8,10,12,16,20,24,21,17,14,10],Sat:[8,14,20,18,15,12,10,8,7,6,5,4,3,2,1,0]};
const HL=['6A','7A','8A','9A','10A','11A','12P','1P','2P','3P','4P','5P','6P','7P','8P','9P'];
function renderChart(day){
  const d=HD[day]||HD.Mon;const mx=Math.max(...d);
  const c=document.getElementById('barChart');c.innerHTML='';
  d.forEach((v,i)=>{
    const w=document.createElement('div');w.className='bar-wrap';
    const b=document.createElement('div');b.className='bar'+(v===mx?' peak':'');
    b.style.height=`${(v/mx)*100}%`;
    const l=document.createElement('div');l.className='bar-label';
    l.textContent=i%2===0?HL[i]:'';
    w.appendChild(b);w.appendChild(l);c.appendChild(w);
  });
}
function setDay(el,day){
  document.querySelectorAll('.day-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');renderChart(day);
}
renderChart('Mon');

/* PACK FEED */
const msgs=[
  '🐺 The wolf on the hill is not as hungry as the wolf climbing it.',
  '💪 Every rep brings you closer to the pack leader.',
  '🔥 Pain is temporary. Pack pride is forever.',
  '🐺 A wolf does not lose sleep over the opinion of sheep.',
  '⚡ Your only competition is who you were yesterday.',
  '🏋️ Iron sharpens iron — the pack makes you stronger.',
  '🐺 Consistency beats intensity. Show up every single day.',
  '💥 The body achieves what the mind believes.',
  '💡 Tip: Hydrate before, during and after every session!',
  '🐺 Train like a wolf. Recover like a champion.',
];
let fi=0;
const ft=document.getElementById('feedText');
const fdots=document.getElementById('feedDots');
msgs.forEach((_,i)=>{const d=document.createElement('div');d.className='fdot'+(i===0?' on':'');fdots.appendChild(d)});
ft.textContent=msgs[0];
function nextFeed(){
  ft.classList.add('out');
  setTimeout(()=>{
    fi=(fi+1)%msgs.length;
    ft.textContent=msgs[fi];
    ft.classList.remove('out');
    document.querySelectorAll('.fdot').forEach((d,i)=>d.classList.toggle('on',i===fi));
  },500);
}
setInterval(nextFeed,8000);

/* STATS from Google Sheets */
function loadStats(){
  if(!SHEET_ID)return;
  const today=new Date().toLocaleDateString('en-GB');
  const cb='akSt_'+Date.now();
  window[cb]=function(data){
    try{
      const rows=data.table.rows||[];
      let ci=0,ex=0;const ins=new Set();
      rows.forEach(r=>{
        const dt=r.c[0]?.f||r.c[0]?.v||'';
        const st=r.c[4]?.v||'';
        const id=String(r.c[2]?.v||'');
        const dStr=typeof dt==='number'?excelDateToJS(dt):dt;
        if(dStr===today||dStr.startsWith(today)){
          if(st==='Entry'){ci++;ins.add(id);}
          if(st==='Exit'){ex++;ins.delete(id);}
        }
      });
      document.getElementById('insideCount').textContent=ins.size;
      document.getElementById('checkinCount').textContent=ci;
      document.getElementById('exitCount').textContent=ex;
      console.log('[AK Stats]',{ci,ex,inside:ins.size});
    }catch(e){console.error('[AK Stats]',e);}
    delete window[cb];
  };
  const s=document.createElement('script');
  s.src=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=Attendance&tq=select%20*&tqx=responseHandler:${cb}`;
  document.head.appendChild(s);
}
function excelDateToJS(serial){const d=new Date(Math.round((serial-25569)*86400*1000));return d.toLocaleDateString('en-GB');}
loadStats();setInterval(loadStats,30000);

/* MIDNIGHT RESET */
let lastDate=new Date().toDateString();
setInterval(()=>{const nd=new Date().toDateString();if(nd!==lastDate){lastDate=nd;loadStats();}},60000);

/* LOGO 5x TAP → ADMIN */
let taps=0,tapT;
document.getElementById('logoEl').addEventListener('click',()=>{
  taps++;clearTimeout(tapT);tapT=setTimeout(()=>taps=0,2000);
  if(taps>=5)window.location.href='admin.html';
});

/* SETUP CHECK */
if(!SHEET_ID)setTimeout(()=>toast('⚙️ Open Admin → Settings to configure Google Sheets','error'),2000);

function toast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.getElementById('tc').appendChild(t);setTimeout(()=>t.remove(),4000);
}
</script>
</body>
</html>
