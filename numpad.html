<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AK Pack — Check In</title>
<link rel="stylesheet" href="style.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}

.bg-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;border-radius:50%;filter:blur(100px);opacity:.08;pointer-events:none;transition:background .4s}
.bg-glow.entry{background:var(--accent)}
.bg-glow.exit{background:var(--red)}

.wrap{width:100%;max-width:400px;padding:20px;display:flex;flex-direction:column;gap:16px;animation:pageUp .4s cubic-bezier(.34,1.56,.64,1);position:relative;z-index:1}
@keyframes pageUp{from{opacity:0;transform:translateY(32px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

.top-nav{display:flex;align-items:center;justify-content:space-between}
.back{display:flex;align-items:center;gap:5px;color:var(--text2);text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:none;border:none;cursor:pointer;transition:color .2s}
.back:hover{color:var(--text)}

.mode-badge{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:30px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.1em}
.mode-badge.entry{background:rgba(0,200,150,.12);border:1px solid rgba(0,200,150,.3);color:var(--accent);box-shadow:0 0 18px rgba(0,200,150,.12)}
.mode-badge.exit{background:rgba(224,85,85,.12);border:1px solid rgba(224,85,85,.3);color:var(--red);box-shadow:0 0 18px rgba(224,85,85,.12)}

.display{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 18px;text-align:center}
.display-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.display-val{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:.14em;line-height:1;min-height:44px;transition:color .2s}
.display-val.entry{color:var(--accent)}
.display-val.exit{color:var(--red)}
.display-val.empty{color:var(--text3)}
.cursor{display:inline-block;width:3px;height:36px;background:var(--text3);vertical-align:middle;margin-left:2px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.nk{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.05em;color:var(--text);cursor:pointer;transition:all .15s cubic-bezier(.34,1.56,.64,1);text-align:center;display:flex;align-items:center;justify-content:center;min-height:58px;user-select:none;border:none;background:var(--card)}
.nk:hover{background:var(--card2);border:1px solid var(--border2);transform:scale(1.04)}
.nk:active{transform:scale(.94);background:var(--bg2)}
.nk.del{font-size:18px;color:var(--text2);border:1px solid var(--border)}
.nk.go{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.08em;border:1px solid var(--border)}
.nk.go.entry{background:rgba(0,200,150,.12);border-color:rgba(0,200,150,.3);color:var(--accent)}
.nk.go.entry:hover{background:var(--accent);color:#000;box-shadow:0 0 20px rgba(0,200,150,.4)}
.nk.go.exit{background:rgba(224,85,85,.12);border-color:rgba(224,85,85,.3);color:var(--red)}
.nk.go.exit:hover{background:var(--red);color:#fff;box-shadow:0 0 20px rgba(224,85,85,.4)}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.shake{animation:shake .4s ease}

.loading{position:fixed;inset:0;background:rgba(10,22,40,.85);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.loading.show{opacity:1;pointer-events:all}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}

@media(max-width:600px){.wrap{padding:14px;max-width:100%}.nk{min-height:52px;font-size:22px}}
@media(max-height:520px){
  .wrap{gap:10px;max-width:100%;flex-direction:row;flex-wrap:wrap;max-width:700px}
  .top-nav,.display{width:100%}
  .numpad{flex:1}
}
</style>
</head>
<body>
<div class="bg-glow" id="glow"></div>

<div class="wrap">
  <div class="top-nav">
    <a class="back" href="index.html">← Back</a>
    <div class="mode-badge" id="modeBadge">✅ ENTRY</div>
  </div>

  <div class="display">
    <div class="display-label">Enter Member ID</div>
    <div class="display-val empty" id="dispVal"><span class="cursor"></span></div>
  </div>

  <div class="numpad">
    <button class="nk" onclick="add('1')">1</button>
    <button class="nk" onclick="add('2')">2</button>
    <button class="nk" onclick="add('3')">3</button>
    <button class="nk" onclick="add('4')">4</button>
    <button class="nk" onclick="add('5')">5</button>
    <button class="nk" onclick="add('6')">6</button>
    <button class="nk" onclick="add('7')">7</button>
    <button class="nk" onclick="add('8')">8</button>
    <button class="nk" onclick="add('9')">9</button>
    <button class="nk del" onclick="del()">⌫</button>
    <button class="nk" onclick="add('0')">0</button>
    <button class="nk go" id="goBtn" onclick="go()">✓ GO</button>
  </div>
</div>

<div class="loading" id="loader"><div class="spinner"></div><div class="loading-text">Looking up member...</div></div>
<div class="toast-container" id="tc"></div>

<script>
const p=new URLSearchParams(location.search);
const mode=p.get('mode')||'entry';
let val='';

const badge=document.getElementById('modeBadge');
const goBtn=document.getElementById('goBtn');
const glow=document.getElementById('glow');
const dv=document.getElementById('dispVal');

if(mode==='exit'){
  badge.textContent='🚪 EXIT';badge.className='mode-badge exit';
  goBtn.className='nk go exit';glow.className='bg-glow exit';
}else{
  badge.textContent='✅ ENTRY';badge.className='mode-badge entry';
  goBtn.className='nk go entry';glow.className='bg-glow entry';
}

function render(){
  if(val){dv.textContent=val;dv.className=`display-val ${mode}`;}
  else{dv.innerHTML='<span class="cursor"></span>';dv.className='display-val empty';}
}
function add(d){if(val.length>=6)return;val+=d;render();if(navigator.vibrate)navigator.vibrate(8);}
function del(){val=val.slice(0,-1);render();}
function go(){
  if(!val){dv.classList.add('shake');setTimeout(()=>dv.classList.remove('shake'),400);toast('Enter a Member ID','error');return;}
  sessionStorage.setItem('ak_member_id',val);
  sessionStorage.setItem('ak_mode',mode);
  document.getElementById('loader').classList.add('show');
  setTimeout(()=>location.href='member.html',700);
}
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9')add(e.key);
  else if(e.key==='Backspace')del();
  else if(e.key==='Enter')go();
});
function toast(msg,type='success'){const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;document.getElementById('tc').appendChild(t);setTimeout(()=>t.remove(),3000);}
</script>
</body>
</html>
